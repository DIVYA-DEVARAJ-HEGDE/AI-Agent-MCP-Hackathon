<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Creative Analytics Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@keyframes glowPulse {0%,100%{box-shadow:0 0 10px #38bdf8;}50%{box-shadow:0 0 25px #818cf8;}}
@keyframes floatCard {0%{transform:translateY(0);}50%{transform:translateY(-6px);}100%{transform:translateY(0);}}

body {
margin:0;
font-family:'Poppins',sans-serif;
background: url('trr.jpg') no-repeat center center fixed;
 background-repeat: repeat;      
    background-size: 300px 300px;   
    background-position: center;    
}

header {
padding:25px 50px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter: blur(12px);
background: rgba(0,0,0,0.3);
border-bottom: 1px solid rgba(255,255,255,0.2);
animation: glowPulse 6s infinite;
}

.title { font-size:2rem; font-weight:700; background: linear-gradient(90deg,#38bdf8,#818cf8,#c084fc); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.wallet-connect {display:flex;align-items:center;gap:12px;}
.btn {
padding:10px 16px;
border-radius:14px;
border:none;
background:linear-gradient(90deg,#38bdf8,#818cf8);
color:#020617;
font-weight:700;
cursor:pointer;
transition:0.3s;
animation: glowPulse 3s infinite;
}
.btn:hover {opacity:0.85; transform:scale(1.05);}

.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr)); gap:30px; padding:40px;}
.card {
background: rgba(0,0,0,0.4);
border-radius:24px;
padding:28px;
backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.12);
box-shadow:0 0 35px rgba(56,189,248,0.3);
transition:0.4s;
animation: floatCard 8s ease-in-out infinite;
}
.card:hover {transform:scale(1.03); box-shadow:0 0 60px rgba(56,189,248,0.5);}
h2 {margin:0 0 20px 0; font-weight:600; font-size:1.5rem;}
canvas {width:100% !important; max-height:400px;}
.footer {text-align:center;padding:20px;font-size:0.9rem;opacity:0.6;margin-top:30px;}
.toast {position:fixed;top:20px;right:20px;padding:14px 22px;background:#38bdf8;color:#020617;font-weight:700;border-radius:16px;box-shadow:0 0 25px rgba(56,189,248,0.6);opacity:0;transition:0.4s;}
.toast.show {opacity:1;} </style>

</head>
<body>

<header>
  <div class="title">📊 Carbon Analytics Creative</div>
  <div class="wallet-connect">
    <div>Wallet: <span id="wallet">Not connected</span></div>
    <button id="connectBtn" class="btn">Connect Wallet</button>
  </div>
</header>

<div class="grid">

  <div class="card">
    <h2>Emission Reduction Trends</h2>
    <canvas id="emissionChart"></canvas>
  </div>

  <div class="card">
    <h2>Token Trading Volume</h2>
    <canvas id="volumeChart"></canvas>
    <button id="simulateTrade" class="btn" style="margin-top:12px;">Simulate Trade (MetaMask)</button>
  </div>

  <div class="card">
    <h2>Market Price of Carbon Credits</h2>
    <canvas id="priceChart"></canvas>
  </div>

</div>

<div class="footer">© 2025 CarbonX Platform • Creative Analytics v3.0</div>
<div id="toast" class="toast"></div>

<script>
let web3, walletAddress=null;
const showToast=msg=>{const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);}

// --- Connect Wallet ---
document.getElementById('connectBtn').addEventListener('click', async ()=>{
  if(window.ethereum){
    web3=new Web3(window.ethereum);
    try{
      const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
      walletAddress=accounts[0];
      document.getElementById('wallet').innerText=walletAddress;
      showToast('Wallet Connected! 🌟');
    }catch{showToast('Connection Rejected! ❌');}
  } else alert('MetaMask not found');
});

// --- Charts ---
const emissionChart=new Chart(document.getElementById('emissionChart'),{
  type:'line',
  data:{labels:['2019','2020','2021','2022','2023','2024'],datasets:[{label:'CO₂ Reduced (tons)',data:[120,190,260,350,460,530],borderWidth:3,borderColor:'#38bdf8',tension:0.4,fill:true,backgroundColor:'rgba(56,189,248,0.2)'}]},
  options:{responsive:true,plugins:{legend:{display:true},tooltip:{mode:'index',intersect:false}}}
});
const volumeChart=new Chart(document.getElementById('volumeChart'),{
  type:'bar',
  data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Tokens Traded', data:[500,900,1200,1600,1300,1800], backgroundColor:'#818cf8', borderRadius:8}]},
  options:{responsive:true,plugins:{legend:{display:true}}}
});
const priceChart=new Chart(document.getElementById('priceChart'),{
  type:'line',
  data:{labels:['Day 1','Day 2','Day 3','Day 4','Day 5'],datasets:[{label:'Token Price (USD)', data:[3.2,3.5,3.1,3.8,4.0], borderWidth:3,borderColor:'#c084fc',tension:0.3,fill:true,backgroundColor:'rgba(192,132,252,0.15)'}]},
  options:{responsive:true,plugins:{legend:{display:true}}}
});

// --- Simulate Trade with MetaMask Approval ---
document.getElementById('simulateTrade').addEventListener('click', async ()=>{
  if(!walletAddress){showToast('Connect wallet first!'); return;}
  try{
    const tx=await web3.eth.sendTransaction({from:walletAddress,to:walletAddress,value:web3.utils.toWei('0.001','ether')});
    showToast('Trade simulated & approved ✅');
    // update chart dynamically
    const randomVolume=Math.floor(Math.random()*500)+200;
    const lastVal=volumeChart.data.datasets[0].data;
    lastVal.push(randomVolume); lastVal.shift();
    volumeChart.update();
  }catch{showToast('Transaction Rejected ❌');}
});
</script>

</body>
</html>
